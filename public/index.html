<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Katexs — Lead Scraper</title>
<style>
  :root { --bg:#0a0a0b; --card:#111214; --line:#26272b; --muted:#8b8f96; --green:#34d399; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:#e7e8ea; font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  .wrap { max-width:560px; margin:6vh auto; padding:0 20px; }
  h1 { font-size:26px; letter-spacing:-.5px; margin:0 0 4px; }
  p.sub { color:var(--muted); margin:0 0 28px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:22px; }
  label { display:block; font-size:12px; color:var(--muted); margin:14px 0 6px; letter-spacing:.3px; }
  input { width:100%; background:#0d0e11; border:1px solid var(--line); border-radius:10px; padding:12px 14px; color:#fff; font-size:15px; }
  input:focus { outline:none; border-color:#3a3b40; }
  button { width:100%; margin-top:22px; background:var(--green); color:#04120c; font-weight:700; font-size:15px; border:0; border-radius:10px; padding:14px; cursor:pointer; }
  button:disabled { opacity:.6; cursor:default; }
  .row { display:flex; gap:12px; }
  .row > div { flex:1; }
  #out { margin-top:18px; padding:14px; border-radius:10px; font-size:14px; display:none; white-space:pre-wrap; }
  .ok { background:rgba(52,211,153,.12); color:var(--green); }
  .err { background:rgba(248,113,113,.12); color:#f87171; }
  .est { color:var(--muted); font-size:12px; margin-top:8px; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Katexs Lead Scraper</h1>
    <p class="sub">Google Maps businesses with phone, full details, and verified emails — delivered to your inbox as a CSV.</p>
    <div class="card">
      <label>Business type</label>
      <input id="businessType" placeholder="HVAC companies" />
      <label>Cities (comma-separated)</label>
      <input id="cities" placeholder="Dallas, Plano, Frisco, Arlington" />
      <div class="row">
        <div><label>State</label><input id="state" placeholder="Texas" /></div>
        <div><label>How many leads</label><input id="count" type="number" value="300" /></div>
      </div>
      <label>Email the CSV to</label>
      <input id="deliverTo" type="email" placeholder="you@katexs.com" />
      <label>Secret</label>
      <input id="secret" type="password" placeholder="your SCRAPE_SECRET" />
      <button id="go">Run scrape</button>
      <div id="out"></div>
    </div>
  </div>
<script>
  const $ = (id) => document.getElementById(id);
  const out = $("out");
  $("go").addEventListener("click", async () => {
    const body = {
      businessType: $("businessType").value,
      cities: $("cities").value,
      state: $("state").value,
      count: $("count").value,
      deliverTo: $("deliverTo").value,
      secret: $("secret").value,
    };
    $("go").disabled = true; $("go").textContent = "Starting…";
    out.style.display = "none";
    try {
      const r = await fetch("/scrape", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(body) });
      const j = await r.json();
      out.style.display = "block";
      if (r.ok) { out.className = "ok"; out.textContent = j.message + "\n\nEstimated cost: " + j.estimatedCost; }
      else { out.className = "err"; out.textContent = j.error || "Something went wrong."; }
    } catch (e) {
      out.style.display = "block"; out.className = "err"; out.textContent = e.message;
    }
    $("go").disabled = false; $("go").textContent = "Run scrape";
  });
</script>
</body>
</html>
